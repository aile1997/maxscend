<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="MAXSCEND 20th Anniversary - 卓胜微合作伙伴大会" />
    <meta property="og:title" content="MAXSCEND 20th Anniversary" />
    <meta property="og:description" content="卓胜微合作伙伴大会" />
    <meta property="og:image" content="./figma-assets/og-share.png" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:," />
    <link rel="preload" as="image" href="./figma-assets/20%E5%91%A8%E5%B9%B4%E8%A7%86%E8%A7%89%E6%96%B9%E6%A1%88to%E5%A4%96%E9%83%A8%201.svg" />
    <link rel="preload" as="image" href="./figma-assets/splash-20-full.svg" />
    <link rel="preload" as="image" href="./figma-assets/splash-logo.svg" />
    <link rel="preload" as="image" href="./figma-assets/header-logo.svg" />
    <link rel="preload" as="image" href="./figma-assets/home-copy.svg" />
    <link rel="preload" as="image" href="./figma-assets/nav-home-active.svg" />
    <link rel="preload" as="image" href="./figma-assets/nav-agenda-inactive.svg" />
    <link rel="preload" as="image" href="./figma-assets/nav-story-inactive.svg" />
    <link rel="preload" as="image" href="./figma-assets/nav-guide-inactive.svg" />
    <link rel="preload" as="image" href="./figma-assets/nav-contact-inactive.svg" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100dvh;
        background: #000;
      }

      #root {
        min-height: 100dvh;
      }

      html:not(.app-ready) #root {
        visibility: hidden;
      }

      .boot-screen {
        --boot-unit: calc(100vw / 402);
        position: fixed;
        inset: 0;
        z-index: 9999;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: "Source Han Sans CN", "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      .boot-screen--hidden {
        opacity: 0;
        filter: blur(6px);
        transform: scale(1.02);
        pointer-events: none;
        transition:
          opacity 0.5s ease,
          filter 0.5s ease,
          transform 0.5s ease;
      }

      .boot-screen__bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 30%;
        animation: boot-bg-drift 6s ease-out both;
      }

      @keyframes boot-bg-drift {
        from {
          transform: scale(1.15);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .boot-screen__hero,
      .boot-screen__copy,
      .boot-screen__logo {
        position: absolute;
        z-index: 1;
      }

      .boot-screen__hero {
        left: calc(73 * var(--boot-unit));
        top: calc(240 * var(--boot-unit));
        width: calc(288 * var(--boot-unit));
        height: calc(138.4 * var(--boot-unit));
        animation: boot-hero-in 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }

      @keyframes boot-hero-in {
        from {
          transform: scale(0.85);
          opacity: 0;
          filter: blur(8px);
        }
        to {
          transform: scale(1);
          opacity: 1;
          filter: blur(0);
        }
      }

      .boot-screen__copy {
        left: calc(111 * var(--boot-unit));
        top: calc(480 * var(--boot-unit));
        width: calc(180 * var(--boot-unit));
        text-align: center;
      }

      .boot-screen__copy p {
        margin: 0;
        animation: boot-text-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .boot-screen__copy p:nth-child(1) {
        animation-delay: 0.5s;
      }
      .boot-screen__copy p:nth-child(2) {
        animation-delay: 0.65s;
      }
      .boot-screen__copy p:nth-child(3) {
        animation-delay: 0.8s;
      }

      @keyframes boot-text-in {
        from {
          transform: translateY(16px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .boot-screen__copy p:nth-child(1) {
        font-size: calc(26 * var(--boot-unit));
        line-height: calc(31 * var(--boot-unit));
      }

      .boot-screen__copy p:nth-child(2) {
        font-size: calc(18 * var(--boot-unit));
        line-height: calc(22 * var(--boot-unit));
      }

      .boot-screen__copy p:nth-child(3) {
        margin-top: calc(2 * var(--boot-unit));
        font-size: calc(20 * var(--boot-unit));
        line-height: calc(29 * var(--boot-unit));
        font-weight: 700;
      }

      .boot-screen__logo {
        left: calc(140 * var(--boot-unit));
        top: calc(660 * var(--boot-unit));
        width: calc(123 * var(--boot-unit));
        height: calc(30.035 * var(--boot-unit));
        animation: boot-logo-in 1s cubic-bezier(0.16, 1, 0.3, 1) 1s both;
      }

      @keyframes boot-logo-in {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
    <title>MAXSCEND 20th Anniversary</title>
  </head>
  <body>
    <div id="boot-screen" class="boot-screen" aria-hidden="true">
      <img class="boot-screen__bg" src="./figma-assets/20%E5%91%A8%E5%B9%B4%E8%A7%86%E8%A7%89%E6%96%B9%E6%A1%88to%E5%A4%96%E9%83%A8%201.svg" alt="" />
      <img class="boot-screen__hero" src="./figma-assets/splash-20-full.svg" alt="" />
      <div class="boot-screen__copy">
        <p>MAXSCEND</p>
        <p>20th Anniversary</p>
        <p>&#21331;&#32988;&#24494;&#21512;&#20316;&#20249;&#20276;&#22823;&#20250;</p>
      </div>
      <img class="boot-screen__logo" src="./figma-assets/splash-logo.svg" alt="" />
    </div>
    <div id="root"></div>
    <script>
      window.__bootScreen = {
        finish() {
          document.documentElement.classList.add("app-ready");
          const bootScreen = document.getElementById("boot-screen");

          if (!bootScreen) {
            return;
          }

          bootScreen.classList.add("boot-screen--hidden");
          window.setTimeout(() => {
            bootScreen.remove();
          }, 600);
        },
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
